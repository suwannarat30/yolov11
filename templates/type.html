<!DOCTYPE html>
<html>
<head>

<title>{{waste}}</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.count{
font-size:80px;
margin-top:50px;
}

</style>

</head>

<body>

<h1>{{waste}}</h1>

<div class="count" id="count">0</div>

<br>
<a href="/">Back</a>

<script>

function update(){

fetch("/data")
.then(res=>res.json())
.then(data=>{

document.getElementById("count").innerText = data["{{waste}}"]

})

}

setInterval(update,1000)

</script>

</body>
</html>
