<!DOCTYPE html>
<html>
<head>

<title>Smart Waste Sorting</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
display:grid;
grid-template-columns:200px 200px;
gap:30px;
justify-content:center;
margin-top:80px;
}

.card{
background:white;
padding:40px;
border-radius:12px;
font-size:22px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>Smart Waste Sorting</h1>

<div class="container">

<div class="card" onclick="go('bottle')">Bottle</div>
<div class="card" onclick="go('glass')">Glass</div>
<div class="card" onclick="go('can')">Can</div>
<div class="card" onclick="go('other')">Other</div>

</div>

<script>

function go(type){
location.href="/type/"+type
}

</script>

</body>
</html>
